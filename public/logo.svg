<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Glow filter for the central node -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Edges — drawn first, behind nodes -->
  <!-- Central hub (256,240) to satellites -->
  <line x1="256" y1="240" x2="130" y2="150" stroke="url(#edgeGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="390" y2="140" stroke="url(#edgeGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="120" y2="320" stroke="url(#edgeGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="400" y2="300" stroke="url(#edgeGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="200" y2="400" stroke="url(#edgeGrad)" stroke-width="4" stroke-linecap="round"/>
  <line x1="256" y1="240" x2="340" y2="410" stroke="url(#edgeGrad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Secondary edges — between satellites -->
  <line x1="130" y1="150" x2="120" y2="320" stroke="url(#edgeGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="390" y1="140" x2="400" y2="300" stroke="url(#edgeGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="200" y1="400" x2="120" y2="320" stroke="url(#edgeGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="340" y1="410" x2="400" y2="300" stroke="url(#edgeGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Leaf edges -->
  <line x1="130" y1="150" x2="60" y2="80" stroke="url(#edgeGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="390" y1="140" x2="450" y2="70" stroke="url(#edgeGrad)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="120" y1="320" x2="50" y2="400" stroke="url(#edgeGrad)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Central node — largest, most connected, brightest -->
  <circle cx="256" cy="240" r="52" fill="url(#grad)" filter="url(#glow)" opacity="0.95"/>
  <circle cx="256" cy="240" r="52" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>

  <!-- Medium satellites — 3-4 connections each -->
  <circle cx="130" cy="150" r="30" fill="url(#grad)" opacity="0.7"/>
  <circle cx="390" cy="140" r="28" fill="url(#grad)" opacity="0.65"/>
  <circle cx="120" cy="320" r="26" fill="url(#grad)" opacity="0.6"/>
  <circle cx="400" cy="300" r="26" fill="url(#grad)" opacity="0.6"/>

  <!-- Smaller nodes — 2 connections -->
  <circle cx="200" cy="400" r="20" fill="url(#grad2)" opacity="0.8"/>
  <circle cx="340" cy="410" r="20" fill="url(#grad2)" opacity="0.8"/>

  <!-- Leaf nodes — 1 connection, smallest, faintest -->
  <circle cx="60" cy="80" r="13" fill="url(#grad2)" opacity="0.7"/>
  <circle cx="450" cy="70" r="13" fill="url(#grad2)" opacity="0.7"/>
  <circle cx="50" cy="400" r="12" fill="url(#grad2)" opacity="0.65"/>
</svg>
